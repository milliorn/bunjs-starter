name: Dependabot reviewer

# Fires whenever Dependabot opens, updates, or reopens a PR targeting main.
# pull_request_target runs in the context of the base branch, which gives the
# GITHUB_TOKEN enough permission to approve and merge without extra secrets.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: ["main"]

# One run per PR at a time. We let the current run finish so an in-progress
# squash merge isn't interrupted mid-flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimum permissions needed:
# - pull-requests: approve, comment, label, and close PRs
# - contents: enable auto-merge (writes to the merge queue)
permissions:
  pull-requests: write
  contents: write

env:
  # Opt into Node.js 24 now ahead of the June 2, 2026 forced migration.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review-dependabot-pr:
    runs-on: ubuntu-latest
    # Skip entirely if this PR wasn't opened by Dependabot.
    if: ${{ github.event.pull_request.user.login == 'dependabot[bot]' }}
    env:
      PR_URL: ${{ github.event.pull_request.html_url }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3.0.0

      # 1. GitHub Actions: always allow regardless of semver level.
      #    --auto queues the merge so all required branch protection checks must
      #    pass first (e.g. dependency-review) before the merge goes through.
      - name: Allow — GitHub Actions update
        if: ${{ steps.metadata.outputs.package-ecosystem == 'github-actions' }}
        run: |
          gh pr review "$PR_URL" --approve -b "Auto-approved: **${{ steps.metadata.outputs.update-type }}** GitHub Actions update."
          gh pr merge "$PR_URL" --squash --auto

      # 2. Patch or minor: allow. Excludes github-actions since step 1 handles those.
      #    Major updates are filtered upstream by dependabot.yml.
      - name: Allow — patch or minor update
        if: >-
          ${{
            steps.metadata.outputs.package-ecosystem != 'github-actions' &&
            (steps.metadata.outputs.update-type == 'version-update:semver-patch' ||
             steps.metadata.outputs.update-type == 'version-update:semver-minor')
          }}
        run: |
          gh pr review "$PR_URL" --approve -b "Auto-approved: **${{ steps.metadata.outputs.update-type }}** update."
          gh pr merge "$PR_URL" --squash --auto

